services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: POSLaravel-app
    volumes:
      - ./src:/var/www/html
    networks:
      - POSLaravel

  node:
    image: node:22
    container_name: POSLaravel-node
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    ports:
      - "5173:5173"
    networks:
      - POSLaravel

  web:
    image: nginx:1-alpine
    container_name: POSLaravel-web
    ports:
      - "8000:80"
    volumes:
      - ./src:/var/www/html
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - POSLaravel

  db:
    image: mysql:8.0
    container_name: POSLaravel-db
    environment:
      MYSQL_DATABASE: POSLaravel
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    networks:
      - POSLaravel

networks:
  POSLaravel:
    driver: bridge
